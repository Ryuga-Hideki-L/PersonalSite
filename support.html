<div id="support-widget">

  <button id="support-toggle">
    <svg viewBox="0 0 24 24" class="chat-icon">
      <path d="M4 4h16v12H7l-3 3V4z"/>
    </svg>
  </button>

  <div id="support-window">

    <div class="support-header">
      <div class="support-title">Support</div>
      <div id="support-close">✕</div>
    </div>

    <div class="support-messages" id="support-messages">
      <div class="msg bot">Hi. Ask your question.</div>
    </div>

    <div class="support-input">
      <input type="text" id="support-text" placeholder="Type a message...">
      <button id="support-send">→</button>
    </div>

  </div>

</div>
